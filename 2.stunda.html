<!DOCTYPE html>
<html lang="lv">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.simplecss.org/simple.min.css">

  <title>HTML Tegi</title>
</head>

<body>
  <h1>Tabulas</h1>

  <table>
    <thead>
      <tr>
        <td>N.p.k.</td>
        <td>Vārds</td>
        <td>Epasts</td>
        <td>Darbības</td>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>1.</td>
        <td>Jānis Ozoliņš</td>
        <td>user1@inbox.lv</td>
        <td>
          <button>Redigēt lietotāju</button>
        </td>
      </tr>
      <tr>
        <td>2.</td>
        <td>Anna Lapiņa</td>
        <td>user2@inbox.lv</td>
        <td>
          <button>Redigēt lietotāju</button>
        </td>
      </tr>
    </tbody>
    <tfoot>
      <tr>
        <td colspan="3">Kopā lietotāju:</td>
        <td>2</td>
      </tr>
    </tfoot>


  </table>


  <h1>Formas</h1>

  <form action="">
    <fieldset>
      <legend>Lietotāja dati</legend>
      <label for="firstname">Jūsu vārds:</label>
      <input type="text" name="firstname" id="firstname">
      <label for="email">Jūsu epasts:</label>
      <input type="email" name="email" id="email">
      <label for="password">Izveidot jaunu paroli:</label>
      <input type="password" name="password" id="password">
      <label for="password">Atkārtot jaunu paroli:</label>
      <input type="password" name="repeat_password" id="password">
    </fieldset>


    <fieldset>
      <legend>Par sevi:</legend>
      <label for="date">Jūsu dzimšanas datums:</label>
      <input type="date" name="date" id="date">
      <label for="color">Jūsu miļāka krāsa</label>
      <input type="color" name="color" id="color">
      



    </fieldset>

  </form>



</body>

</html>
